<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 數位衣櫃管家</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const Shirt = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.47a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.47a2 2 0 00-1.34-2.23z"/></svg>;
    const Briefcase = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>;
    const Coffee = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 8h1a4 4 0 110 8h-1"/><path d="M3 8h14v9a4 4 0 01-4 4H7a4 4 0 01-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>;
    const Heart = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0016.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 002 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
    const Sun = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
    const CloudRain = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 14.899A7 7 0 1115.71 8h1.79a4.5 4.5 0 012.5 8.242"/><path d="M16 14v6"/><path d="M8 14v6"/><path d="M12 16v6"/></svg>;
    const ThermometerSnowflake = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 12h10"/><path d="M9 4v16"/><path d="m3 9 3 3-3 3"/><path d="M12 6a4 4 0 00-4 4"/><path d="M8 14a4 4 0 004 4"/><path d="M14 4v10.54a4 4 0 11-4 0V4a2 2 0 014 0Z"/></svg>;
    const Dices = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="12" height="12" x="2" y="10" rx="2" ry="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 000-3l-5-4.92a2.24 2.24 0 00-3 0L10 6"/><path d="M6 18h.01"/><path d="M10 14h.01"/><path d="M15 6h.01"/><path d="M18 9h.01"/></svg>;
    const Trash2 = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const BookHeart = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><path d="M16 8.5c0 1.5-2.5 4-2.5 4s-2.5-2.5-2.5-4a2.25 2.25 0 1 1 5 0Z"/></svg>;
    const Bookmark = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>;
    const Edit2 = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>;

const defaultWardrobe = [];

const typeLabels = {
    top: '上衣', pants: '褲子', skirt: '裙子', dress: '洋裝', outerwear: '外套',
    shoes: '鞋履', bag: '包包', accessory: '配件', other: '其他'
  };



const colorPalette = [
  { name: '黑色', rgb: [45, 45, 45], hex: '#000000' }, 
  { name: '白色', rgb: [235, 235, 235], hex: '#ffffff' },
  { name: '灰色', rgb: [140, 140, 140], hex: '#808080' }, 
  { name: '紅色', rgb: [180, 45, 45], hex: '#ff0000' },
  { name: '深藍色', rgb: [45, 55, 110], hex: '#000080' }, 
  { name: '淺藍/牛仔', rgb: [110, 150, 190], hex: '#87ceeb' }, 
  { name: '綠色', rgb: [60, 130, 60], hex: '#008000' },
  { name: '黃色', rgb: [210, 190, 60], hex: '#ffff00' }, 
  { name: '粉色', rgb: [230, 160, 180], hex: '#ffc0cb' },
  { name: '卡其/大地', rgb: [185, 165, 135], hex: '#c3b091' }, 
  { name: '棕色', rgb: [110, 75, 50], hex: '#654321' },
  { name: '紫色', rgb: [120, 60, 130], hex: '#800080' }
];

const getSmartMaterial = (category) => {
  if (category === 'shoes' || category === 'bag') return '皮革';
  if (category === 'pants' || category === 'skirt') return '棉麻'; 
  return '棉質';
};

function App() {
  const [activeTab, setActiveTab] = useState('wardrobe'); 
  
  // Load state from local storage on initial render
  const [wardrobe, setWardrobe] = useState(() => {
    const saved = localStorage.getItem('wardrobe');
    if (!saved) return defaultWardrobe;
    
    try {
      const parsed = JSON.parse(saved);
      // Check if any item is a legacy dummy item (no imageUrl or has an 'icon' field or external url).
      // If we find even one legacy item, we wipe the entire legacy state to prevent them from showing up.
      const hasLegacyItems = parsed.some(item => !item.imageUrl || item.icon || (item.imageUrl && !item.imageUrl.startsWith('blob:') && !item.imageUrl.startsWith('data:')));
      if (hasLegacyItems) {
        console.log("Detected legacy dummy items in localStorage, clearing wardrobe.");
        localStorage.removeItem('wardrobe');
        return defaultWardrobe;
      }
      return parsed;
    } catch(e) {
      return defaultWardrobe;
    }
  });

  const [outfitDiary, setOutfitDiary] = useState(() => {
    const saved = localStorage.getItem('outfitDiary');
    if (!saved) return [];
    try {
      const parsed = JSON.parse(saved);
      return parsed;
    } catch(e) {
      return [];
    }
  });
  
  const [weather, setWeather] = useState('sunny');
  const [occasion, setOccasion] = useState('casual');
  const [outfit, setOutfit] = useState(null);
  const [isDrawing, setIsDrawing] = useState(false);
  const [saveSuccessMsg, setSaveSuccessMsg] = useState(false);
  const [filterCategory, setFilterCategory] = useState('all');

  const [editingItem, setEditingItem] = useState(null);

  const [processQueue, setProcessQueue] = useState([]);
  const [isProcessingModalOpen, setIsProcessingModalOpen] = useState(false);
  const fileInputRef = useRef(null);

  const filterContainerRef = useRef(null);
  const dragRef = useRef({ isDown: false, startX: 0, scrollLeft: 0 });

  // Common drag handlers
  const createDragHandlers = (containerRef, dragStateRef) => ({
    onMouseDown: (e) => {
      dragStateRef.current.isDown = true;
      dragStateRef.current.startX = e.pageX - containerRef.current.offsetLeft;
      dragStateRef.current.scrollLeft = containerRef.current.scrollLeft;
    },
    onMouseLeave: () => { dragStateRef.current.isDown = false; },
    onMouseUp: () => { dragStateRef.current.isDown = false; },
    onMouseMove: (e) => {
      if (!dragStateRef.current.isDown) return;
      e.preventDefault();
      const x = e.pageX - containerRef.current.offsetLeft;
      const walk = (x - dragStateRef.current.startX) * 2; 
      containerRef.current.scrollLeft = dragStateRef.current.scrollLeft - walk;
    }
  });
  useEffect(() => {
    try {
      localStorage.setItem('wardrobe', JSON.stringify(wardrobe));
    } catch (e) {
      if (e.name === 'QuotaExceededError') {
        console.error("Storage full!");
        alert("⚠️ 數位衣櫃容量已滿！請先刪除部分舊衣物再新增，或是您的照片解析度過高。");
      }
    }
  }, [wardrobe]);

  useEffect(() => {
    try {
      localStorage.setItem('outfitDiary', JSON.stringify(outfitDiary));
    } catch (e) {}
  }, [outfitDiary]);

  const handleMouseDown = (e) => {
    dragRef.current.isDown = true;
    dragRef.current.startX = e.pageX - filterContainerRef.current.offsetLeft;
    dragRef.current.scrollLeft = filterContainerRef.current.scrollLeft;
  };
  const handleMouseLeave = () => { dragRef.current.isDown = false; };
  const handleMouseUp = () => { dragRef.current.isDown = false; };
  const handleMouseMove = (e) => {
    if (!dragRef.current.isDown) return;
    e.preventDefault();
    const x = e.pageX - filterContainerRef.current.offsetLeft;
    const walk = (x - dragRef.current.startX) * 2; 
    filterContainerRef.current.scrollLeft = dragRef.current.scrollLeft - walk;
  };

  const deleteItem = (id) => {
    setWardrobe(prev => prev.filter(item => item.id !== id));
  };

  const drawOutfit = () => {
    setIsDrawing(true);
    setSaveSuccessMsg(false);

    // Get the active template rules
    const activeTemplate = styleTemplates.find(t => t.id === selectedTemplate);

    setTimeout(() => {
      // Helper function to get a random item from a filtered pool
      const getRandomItem = (category) => {
        let pool = wardrobe.filter(item => {
           if (item.type !== category) return false;
           // Weather and occasion filters still apply, use optional chaining for old data
           const matchWeather = item.weather?.includes(weather) || item.weather?.includes('all');
           const matchOccasion = item.occasion?.includes(occasion) || item.occasion?.includes('all');
           return matchWeather && matchOccasion;
        });

        if (pool.length === 0) return null;
        return pool[Math.floor(Math.random() * pool.length)];
      };

      const dress = getRandomItem('dress');
      const top = getRandomItem('top');
      const bottom = getRandomItem('pants') || getRandomItem('skirt');
      const shoes = getRandomItem('shoes');

      // Decide if we should wear a dress or top+bottom
      let newOutfit;
      if (dress && (!top || !bottom || Math.random() > 0.5)) {
        // Wear a dress
        newOutfit = {
          top: dress, // Store dress in the 'top' slot for rendering purposes
          bottom: null, // No bottom needed
          shoes: shoes
        };
      } else {
        // Wear top and bottom
        newOutfit = {
          top: top,
          bottom: bottom,
          shoes: shoes
        };
      }
      
      setOutfit(newOutfit);
      setIsDrawing(false);
    }, 800);
  };

  const saveOutfitToDiary = () => {
    if (!outfit || Object.values(outfit).every(item => item === null)) return;
    
    const newEntry = {
      id: Date.now().toString(),
      timestamp: new Date().toLocaleString('zh-TW', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
      weather,
      occasion,
      outfit: { ...outfit }
    };

    setOutfitDiary(prev => [newEntry, ...prev]);
    setSaveSuccessMsg(true);
    setTimeout(() => setSaveSuccessMsg(false), 3000);
  };

  const deleteDiaryEntry = (id) => {
    setOutfitDiary(prev => prev.filter(entry => entry.id !== id));
  };

  const saveEditedItem = (e) => {
    e.preventDefault();
    if (!editingItem) return;

    setWardrobe(prev => prev.map(item => 
      item.id === editingItem.id ? { ...editingItem } : item
    ));
    setEditingItem(null);
  };

  const handleEditChange = (field, value) => {
    setEditingItem(prev => {
      const updated = { ...prev, [field]: value };
      if (field === 'colorName') {
         const matchingColor = colorPalette.find(c => c.name === value);
         if (matchingColor) updated.colorHex = matchingColor.hex;
      }
      return updated;
    });
  };

  const [isSplitting, setIsSplitting] = useState(false);

  const splitDressToTopBottom = async (item) => {
    if (!item || !item.imageUrl) return;
    setIsSplitting(true);
    try {
      const topData = await cropImage(item.imageUrl, 'top');
      const bottomData = await cropImage(item.imageUrl, 'bottom');
      const bottomCategory = Math.random() > 0.5 ? 'pants' : 'skirt';

      const topItem = {
        id: Date.now() + Math.random(),
        imageUrl: topData.url, type: 'top', name: '上衣 (從洋裝拆分)',
        colorName: topData.color.name, colorHex: topData.color.hex,
        material: item.material || getSmartMaterial('top'), pattern: topData.pattern,
        weather: item.weather || ['sunny', 'warm'], occasion: item.occasion || ['casual', 'work', 'date'], isDeepSplit: true
      };

      const bottomItem = {
        id: Date.now() + Math.random() + 1,
        imageUrl: bottomData.url, type: bottomCategory, name: '下身 (從洋裝拆分)',
        colorName: bottomData.color.name, colorHex: bottomData.color.hex,
        material: item.material || getSmartMaterial(bottomCategory), pattern: bottomData.pattern,
        weather: item.weather || ['sunny', 'warm', 'cold'], occasion: item.occasion || ['casual', 'work', 'date'], isDeepSplit: true
      };

      // Remove original dress and add two new items
      setWardrobe(prev => {
        const filtered = prev.filter(w => w.id !== item.id);
        return [topItem, bottomItem, ...filtered];
      });
      setEditingItem(null);
    } catch (e) {
      console.error('Split failed:', e);
      alert('拆分失敗，請重試');
    } finally {
      setIsSplitting(false);
    }
  };

  const guessCategoryByRatio = (width, height) => {
    const ratio = width / height;
    if (ratio > 1.2) return 'shoes'; 
    if (ratio > 0.8 && ratio <= 1.2) return Math.random() > 0.5 ? 'bag' : 'top';
    // If it's very tall (ratio < 0.8), it could be pants/skirt, OR it could be a vertical photo of shoes/bag.
    // For a lightweight app without real AI classification, we'll default to 'top' or 'pants',
    // but the user now has the Edit button to fix any misclassifications!
    return Math.random() > 0.5 ? 'top' : (Math.random() > 0.5 ? 'pants' : 'shoes'); 
  };

  const loadMobileNetBase = async () => {
    if (!window.mobileNetModel) {
        window.mobileNetModel = await mobilenet.load({ version: 2, alpha: 0.5 });
    }
    return window.mobileNetModel;
  };

  const predictCategoryBasedOnAI = async (imgElement, fallbackRatioWidth, fallbackRatioHeight) => {
    try {
        const model = await loadMobileNetBase();
        const predictions = await model.classify(imgElement, 3);
        
        // Map ImageNet classes to our app categories
        const categoryMap = {
            'shoes': ['shoe', 'sandal', 'boot', 'sneaker', 'clog', 'loafers', 'running shoe'],
            'bag': ['bag', 'purse', 'backpack', 'satchel', 'pouch', 'wallet', 'mailbag'],
            'top': ['shirt', 'jersey', 'sweater', 'cardigan', 'sweatshirt', 't-shirt', 'coat', 'jacket', 'cloak', 'poncho'],
            'pants': ['jean', 'trouser', 'pant', 'sweatpant', 'suit', 'pajama'],
            'skirt': ['skirt', 'miniskirt', 'hoopskirt'],
            'dress': ['dress', 'gown', 'suit']
        };

        for (let i = 0; i < predictions.length; i++) {
            const classNameStr = predictions[i].className.toLowerCase();
            for (const [appCategory, keywords] of Object.entries(categoryMap)) {
                if (keywords.some(kw => classNameStr.includes(kw))) {
                    return appCategory;
                }
            }
        }
        // Fallback to ratio if AI is completely confused
        return guessCategoryByRatio(fallbackRatioWidth, fallbackRatioHeight);
    } catch (e) {
        console.error("MobileNet failed, falling back to ratio", e);
        return guessCategoryByRatio(fallbackRatioWidth, fallbackRatioHeight);
    }
  };

  const extractFeaturesFromCanvas = (canvas, ctx, section = 'single') => {
    try {
      const startX = Math.floor(canvas.width * 0.3);
      const width = Math.floor(canvas.width * 0.4);
      let startY, height;

      if (section === 'top') {
        startY = Math.floor(canvas.height * 0.2);
        height = Math.floor(canvas.height * 0.5);
      } else if (section === 'bottom') {
        startY = Math.floor(canvas.height * 0.05); 
        height = Math.floor(canvas.height * 0.25);
      } else {
        startY = Math.floor(canvas.height * 0.3);
        height = Math.floor(canvas.height * 0.4);
      }

      if (width === 0 || height === 0) return { color: colorPalette[1], pattern: '素色' };

      const data = ctx.getImageData(startX, startY, width, height).data;
      const colorCounts = new Array(colorPalette.length).fill(0);
      
      let validPixels = 0;

      for (let i = 0; i < data.length; i += 16) { 
        const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
        if (a < 128) continue; 
        if (r > 250 && g > 250 && b > 250) continue; 
        
        const isSkin = (r > 120 && g > 70 && b > 40 && r > g && g > b && (r - g) > 15 && (r - g) < 70);
        if (isSkin) continue;

        validPixels++;
        let minDistance = Infinity;
        let closestIndex = 0;
        for (let j = 0; j < colorPalette.length; j++) {
          const c = colorPalette[j];
          const dist = 0.3 * Math.pow(r - c.rgb[0], 2) + 0.59 * Math.pow(g - c.rgb[1], 2) + 0.11 * Math.pow(b - c.rgb[2], 2);
          if (dist < minDistance) { minDistance = dist; closestIndex = j; }
        }
        colorCounts[closestIndex]++;
      }
      
      if (validPixels < 20) return { color: colorPalette[1], pattern: '素色' };

      let maxCount = 0;
      let dominantIndex = 1; 
      let secondMaxCount = 0;
      let secondIndex = 1;

      for (let k = 0; k < colorCounts.length; k++) {
        if (colorCounts[k] > maxCount) {
          secondMaxCount = maxCount;
          secondIndex = dominantIndex;
          maxCount = colorCounts[k];
          dominantIndex = k;
        } else if (colorCounts[k] > secondMaxCount) {
          secondMaxCount = colorCounts[k];
          secondIndex = k;
        }
      }
      
      const dominantRatio = maxCount / validPixels;
      let detectedPattern = '素色';
      let finalColorIndex = dominantIndex;

      if (dominantRatio < 0.60) {
        detectedPattern = '印花/圖案';
        const lightBackgrounds = ['白色', '卡其/大地', '灰色'];
        if (lightBackgrounds.includes(colorPalette[dominantIndex].name)) {
            if (colorPalette[secondIndex].name === '黑色' && (secondMaxCount / validPixels) > 0.20) {
                finalColorIndex = secondIndex; 
            }
        }
      }
      
      return { color: colorPalette[finalColorIndex], pattern: detectedPattern };
    } catch(e) {
      return { color: colorPalette[1], pattern: '素色' }; 
    }
  };

  const loadBodyPixBase = async () => {
    if (!window.bodyPixModel) {
        window.bodyPixModel = await bodyPix.load({
          architecture: 'MobileNetV1',
          outputStride: 16,
          multiplier: 0.75,
          quantBytes: 2
        });
    }
    return window.bodyPixModel;
  };

  // Helper to downscale large images before saving to save localStorage space
  const downscaleCanvas = (sourceCanvas, maxWidth = 800) => {
      if (sourceCanvas.width <= maxWidth && sourceCanvas.height <= maxWidth) return sourceCanvas.toDataURL('image/jpeg', 0.85);
      
      const scale = maxWidth / Math.max(sourceCanvas.width, sourceCanvas.height);
      const newCanvas = document.createElement('canvas');
      newCanvas.width = Math.floor(sourceCanvas.width * scale);
      newCanvas.height = Math.floor(sourceCanvas.height * scale);
      newCanvas.getContext('2d').drawImage(sourceCanvas, 0, 0, newCanvas.width, newCanvas.height);
      return newCanvas.toDataURL('image/jpeg', 0.85); // Use JPEG compression
  };

  const extractClothingFromHuman = async (imgElement, category = 'top') => {
    try {
        const net = await loadBodyPixBase();
        
        // Scale down initially to speed up BodyPix and save memory
        const scale = Math.min(1, 800 / Math.max(imgElement.naturalWidth, imgElement.naturalHeight));
        const processWidth = Math.floor(imgElement.naturalWidth * scale);
        const processHeight = Math.floor(imgElement.naturalHeight * scale);

        const canvas = document.createElement('canvas');
        canvas.width = processWidth;
        canvas.height = processHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(imgElement, 0, 0, processWidth, processHeight);

        // Strategy: BACKGROUND REMOVAL ONLY
        // Keep the entire person (with clothes) intact, only remove the background.
        // This produces a clean cutout of the person wearing the clothing item.
        const segmentation = await net.segmentPerson(canvas, {
            internalResolution: 'medium',
            segmentationThreshold: 0.5,
            scoreThreshold: 0.3
        });

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        // Auto-crop bounding box variables
        let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
        let hasContent = false;

        // Remove background pixels only (keep entire person)
        for (let i = 0; i < segmentation.data.length; i++) {
           const isPerson = segmentation.data[i];
           const px = i * 4;
           
           if (!isPerson) {
               // This is background - make transparent
               data[px + 3] = 0;
           } else {
               // This is part of the person - keep and update bounds
               const x = i % canvas.width;
               const y = Math.floor(i / canvas.width);
               if (x < minX) minX = x;
               if (x > maxX) maxX = x;
               if (y < minY) minY = y;
               if (y > maxY) maxY = y;
               hasContent = true;
           }
        }
        
        ctx.putImageData(imageData, 0, 0);

        // Edge smoothing: soften the boundary between person and transparent background
        // by applying partial transparency to border pixels
        const smoothData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const sd = smoothData.data;
        const w = canvas.width;
        for (let y = 1; y < canvas.height - 1; y++) {
            for (let x = 1; x < w - 1; x++) {
                const idx = (y * w + x) * 4;
                if (sd[idx + 3] > 0) {
                    // Check if this is an edge pixel (has at least one transparent neighbor)
                    const neighbors = [
                        ((y-1) * w + x) * 4,
                        ((y+1) * w + x) * 4,
                        (y * w + (x-1)) * 4,
                        (y * w + (x+1)) * 4
                    ];
                    let transparentCount = 0;
                    for (const nIdx of neighbors) {
                        if (sd[nIdx + 3] === 0) transparentCount++;
                    }
                    // If it's an edge pixel, soften its alpha for smoother edges
                    if (transparentCount > 0 && transparentCount < 4) {
                        sd[idx + 3] = Math.round(255 * (1 - transparentCount * 0.2));
                    }
                }
            }
        }
        ctx.putImageData(smoothData, 0, 0);

        // Auto-Crop logic: If we found the person, crop the canvas down to just that bounding box (+ padding)
        if (hasContent) {
            const padding = 10;
            minX = Math.max(0, minX - padding);
            minY = Math.max(0, minY - padding);
            maxX = Math.min(canvas.width, maxX + padding);
            maxY = Math.min(canvas.height, maxY + padding);

            const cropWidth = maxX - minX;
            const cropHeight = maxY - minY;

            if (cropWidth > 50 && cropHeight > 50) {
                const cropCanvas = document.createElement('canvas');
                cropCanvas.width = cropWidth;
                cropCanvas.height = cropHeight;
                cropCanvas.getContext('2d').putImageData(ctx.getImageData(minX, minY, cropWidth, cropHeight), 0, 0);
                return cropCanvas.toDataURL('image/png');
            }
        } 
        
        return downscaleCanvas(canvas);

    } catch(e) {
        console.error("BodyPix extraction failed:", e);
        return null; // fallback
    }
  };

  const analyzeImageColor = (imgElement) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = imgElement.naturalWidth;
    canvas.height = imgElement.naturalHeight;
    ctx.drawImage(imgElement, 0, 0);
    return extractFeaturesFromCanvas(canvas, ctx, 'single');
  };

  const cropImage = (imageSrc, section) => {
    return new Promise((resolve) => {
      const img = new Image();
      img.src = imageSrc;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        if (section === 'top') {
          const cropY = img.naturalHeight * 0.15; 
          const cropHeight = img.naturalHeight * 0.45; 
          const cropX = img.naturalWidth * 0.15; 
          const cropWidth = img.naturalWidth * 0.70; 

          canvas.width = cropWidth;
          canvas.height = cropHeight;
          ctx.drawImage(img, cropX, cropY, cropWidth, cropHeight, 0, 0, canvas.width, canvas.height);
        } else {
          const cropY = img.naturalHeight * 0.52; 
          const cropHeight = img.naturalHeight * 0.35; 
          const cropX = img.naturalWidth * 0.15;
          const cropWidth = img.naturalWidth * 0.70;

          canvas.width = cropWidth;
          canvas.height = cropHeight;
          ctx.drawImage(img, cropX, cropY, cropWidth, cropHeight, 0, 0, canvas.width, canvas.height);
        }
        
        const features = extractFeaturesFromCanvas(canvas, ctx, section);
        resolve({ url: downscaleCanvas(canvas), color: features.color, pattern: features.pattern });
      };
      img.onerror = () => resolve({ url: imageSrc, color: colorPalette[0], pattern: '素色' }); 
    });
  };

  // --- 真正的批次上傳與智慧判斷 ---
  const handleBatchUpload = async (event) => {
    const files = Array.from(event.target.files);
    if (files.length === 0) return;
    
    setIsProcessingModalOpen(true);
    const newQueue = files.map((file, idx) => ({
      id: Date.now() + idx, url: URL.createObjectURL(file), status: 'pending', name: file.name, file: file, taskType: 'analyzing'
    }));
    setProcessQueue(newQueue);

    let processedItems = [];

    for (let i = 0; i < newQueue.length; i++) {
      let currentItem = newQueue[i];
      
      const img = await new Promise((resolve) => {
        const image = new Image();
        image.src = currentItem.url;
        image.onload = () => resolve(image);
        image.onerror = () => resolve(null);
      });

      if (!img) continue;

      const ratio = img.naturalWidth / img.naturalHeight;
      let isFullBody = false; 

      // Use AI to predict category FIRST
      setProcessQueue(prev => prev.map(item => item.id === currentItem.id ? { ...item, status: 'predicting' } : item));
      const detectedCategory = await predictCategoryBasedOnAI(img, img.naturalWidth, img.naturalHeight);

      // Only consider splitting if it's NOT a dress, and it's a tall image
      if (ratio <= 0.85 && detectedCategory !== 'dress') {
         setProcessQueue(prev => prev.map(item => item.id === currentItem.id ? { ...item, status: 'deep_analyze', taskType: 'deep_split' } : item));
         try {
             const net = await loadBodyPixBase();
             const parts = await net.segmentPersonParts(img, {
                 internalResolution: 'low',
                 segmentationThreshold: 0.5
             });
             let torsoCount = 0;
             let legCount = 0;
             for (let i = 0; i < parts.data.length; i++) {
                 const p = parts.data[i];
                 if (p === 12 || p === 13) torsoCount++; // Torso front/back
                 if (p >= 14 && p <= 17) legCount++; // Upper/Lower legs
             }
             // Require significant torso and legs to classify as full body
             if (torsoCount > 150 && legCount > 150) {
                 isFullBody = true;
             }
         } catch(e) {
             console.error("Full body check failed", e);
         }
      }

      if (isFullBody) {
        setProcessQueue(prev => prev.map(item => item.id === currentItem.id ? { ...item, status: 'deep_analyze', taskType: 'deep_split' } : item));
        await new Promise(r => setTimeout(r, 800));

        setProcessQueue(prev => prev.map(item => item.id === currentItem.id ? { ...item, status: 'deep_segment' } : item));
        const topData = await cropImage(currentItem.url, 'top'); 
        const bottomData = await cropImage(currentItem.url, 'bottom'); 

        setProcessQueue(prev => prev.map(item => item.id === currentItem.id ? { ...item, status: 'deep_inpaint' } : item));
        await new Promise(r => setTimeout(r, 800));

        const bottomCategory = Math.random() > 0.5 ? 'pants' : 'skirt';

        processedItems.push({
            id: Date.now() + Math.random(),
            imageUrl: topData.url, type: 'top', name: '上衣 (特寫裁切)',
            colorName: topData.color.name, colorHex: topData.color.hex, 
            material: getSmartMaterial('top'), pattern: topData.pattern,
            weather: ['sunny', 'warm'], occasion: ['casual', 'work', 'date'], isDeepSplit: true 
        });

        processedItems.push({
              id: Date.now() + Math.random(),
              imageUrl: bottomData.url, type: bottomCategory, name: '下身 (特寫裁切)',
              colorName: bottomData.color.name, colorHex: bottomData.color.hex, 
              material: getSmartMaterial(bottomCategory), pattern: bottomData.pattern,
              weather: ['sunny', 'warm', 'cold'], occasion: ['casual', 'work', 'date'], isDeepSplit: true
        });

        setProcessQueue(prev => prev.map(item => item.id === currentItem.id ? { ...item, status: 'deep_done' } : item));
        
      } else {
        setProcessQueue(prev => prev.map(item => item.id === currentItem.id ? { ...item, status: 'removing_bg', taskType: 'batch' } : item));
        
        // We already detected the category earlier, so we just use detectedCategory
        
        let finalImageUrl = img.src; // Keep original blob if fallback fails
        let targetImg = img; // Initialize targetImg correctly

        try {
            // Only try aggressive human extraction if we suspect it's a top, pants, or skirt. 
            // For shoes and bags, just keep the original image.
            if (['top', 'pants', 'skirt', 'dress'].includes(detectedCategory)) {
                setProcessQueue(prev => prev.map(item => item.id === currentItem.id ? { ...item, status: 'removing_bg' } : item));
                const noHumanUrl = await extractClothingFromHuman(img, detectedCategory);
                if (noHumanUrl) {
                    finalImageUrl = noHumanUrl;
                    targetImg = await new Promise((res) => {
                        const temp = new Image();
                        temp.src = noHumanUrl;
                        temp.onload = () => res(temp);
                        temp.onerror = () => res(img);
                    });
                }
            } else {
               // Must compress accessories before saving, else blob URL breaks, or original raw image causes Quota issues
               const c = document.createElement('canvas');
               c.width = img.naturalWidth;
               c.height = img.naturalHeight;
               c.getContext('2d').drawImage(img, 0, 0);
               finalImageUrl = downscaleCanvas(c);
               
               // Create a new image element for the downscaled canvas to pass to analyzeImageColor
               targetImg = await new Promise((res) => {
                  const temp = new Image();
                  temp.src = finalImageUrl;
                  temp.onload = () => res(temp);
                  temp.onerror = () => res(img);
               });
            }
        } catch(e) {
            console.error(e);
        }
        
        setProcessQueue(prev => prev.map(item => item.id === currentItem.id ? { ...item, status: 'analyzing' } : item));
        await new Promise(r => setTimeout(r, 400));
        
        const features = analyzeImageColor(targetImg); 
        const autoTags = {
          material: getSmartMaterial(detectedCategory),
          pattern: features.pattern
        };
        
        processedItems.push({
          id: Date.now() + Math.random(),
          imageUrl: finalImageUrl, type: detectedCategory, name: `單品${typeLabels[detectedCategory] || ''}`,
          colorName: features.color.name, colorHex: features.color.hex, 
          material: autoTags.material, pattern: autoTags.pattern,
          weather: ['sunny', 'warm', 'cold'], occasion: ['casual', 'work', 'date']
        });
        
        setProcessQueue(prev => prev.map(item => item.id === currentItem.id ? { ...item, status: 'done', category: detectedCategory, tags: autoTags } : item));
      }
      
      await new Promise(r => setTimeout(r, 500)); 
    }

    setTimeout(() => {
      setWardrobe(prev => [...processedItems, ...prev]);
      setIsProcessingModalOpen(false);
      setProcessQueue([]);
      if(fileInputRef.current) fileInputRef.current.value = '';
    }, 1200);
  };

  const renderProcessStatus = (item) => {
    if (item.taskType === 'batch') {

      if (item.status === 'predicting') return <span className="text-pink-600 font-bold">🧠 AI 正在辨識單品種類...</span>;
      if (item.status === 'removing_bg') return <span className="text-indigo-600 font-bold">🤖 AI 正在剝離人體與背景...</span>;
      if (item.status === 'analyzing') return <span className="text-amber-600 font-bold">🎨 分析布料與顏色...</span>;
      if (item.status === 'done') return <div className="flex gap-1 flex-wrap mt-0.5"><span className="bg-indigo-100 text-indigo-700 px-1 rounded">{typeLabels[item.category]}</span><span className="bg-gray-200 text-gray-700 px-1 rounded">{item.tags?.material}</span><span className="bg-gray-200 text-gray-700 px-1 rounded">{item.tags?.pattern}</span></div>;
    } else if (item.taskType === 'deep_split') {
      if (item.status === 'deep_start') return "前端影像處理引擎啟動...";
      if (item.status === 'deep_analyze') return <span className="text-blue-600 font-bold">🤖 分析影像長寬特徵...</span>;
      if (item.status === 'deep_segment') return <span className="text-orange-600 font-bold">🎯 智能定位：聚焦衣物主體...</span>;
      if (item.status === 'deep_inpaint') return <span className="text-purple-600 font-bold">✨ 過濾邊緣並分析布料屬性...</span>;
      if (item.status === 'deep_done') return <span className="text-teal-600 font-bold">✅ 成功！完成前端裁切預覽</span>;
    }
    return "處理中...";
  };

  return (
    <>
      <style>{`
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
      `}</style>
      <div className="min-h-screen bg-gray-50 flex justify-center font-sans text-gray-800">
        <div className="w-full max-w-md bg-white shadow-xl overflow-hidden flex flex-col relative h-[100vh]">
          
          <header className="bg-indigo-600 text-white p-4 shadow-md z-10 shrink-0">
            <h1 className="text-xl font-bold flex items-center justify-center gap-2">
              <Dices size={24} />
              AI 數位衣櫃管家
            </h1>
          </header>

          <main className="flex-1 overflow-y-auto p-4 pb-24 hide-scroll relative">
            
            {activeTab === 'lottery' && (
              <div className="space-y-6 flex flex-col items-center animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="w-full bg-indigo-50 p-5 rounded-2xl shadow-sm border border-indigo-100">
                  <h2 className="text-sm font-semibold text-indigo-800 mb-3 flex items-center gap-2">
                    <span className="bg-indigo-200 text-indigo-800 w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
                    設定今日情境
                  </h2>
                  <div className="space-y-4">
                    <div>
                      <label className="text-xs text-gray-500 mb-2 block">外面天氣如何？</label>
                      <div className="flex gap-2">
                        <button onClick={() => setWeather('sunny')} className={`flex-1 py-2 px-1 rounded-xl flex flex-col items-center justify-center gap-1 text-sm transition-all ${weather === 'sunny' ? 'bg-white shadow-md text-amber-500 border-amber-200 border' : 'bg-transparent text-gray-500 hover:bg-indigo-100'}`}>
                          <Sun size={20} /> 晴天
                        </button>
                        <button onClick={() => setWeather('rainy')} className={`flex-1 py-2 px-1 rounded-xl flex flex-col items-center justify-center gap-1 text-sm transition-all ${weather === 'rainy' ? 'bg-white shadow-md text-blue-500 border-blue-200 border' : 'bg-transparent text-gray-500 hover:bg-indigo-100'}`}>
                          <CloudRain size={20} /> 雨天
                        </button>
                        <button onClick={() => setWeather('cold')} className={`flex-1 py-2 px-1 rounded-xl flex flex-col items-center justify-center gap-1 text-sm transition-all ${weather === 'cold' ? 'bg-white shadow-md text-cyan-600 border-cyan-200 border' : 'bg-transparent text-gray-500 hover:bg-indigo-100'}`}>
                          <ThermometerSnowflake size={20} /> 寒冷
                        </button>
                      </div>
                    </div>
                    <div>
                      <label className="text-xs text-gray-500 mb-2 block">今天主要場合？</label>
                      <div className="flex gap-2">
                        <button onClick={() => setOccasion('work')} className={`flex-1 py-2 px-1 rounded-xl flex flex-col items-center justify-center gap-1 text-sm transition-all ${occasion === 'work' ? 'bg-white shadow-md text-indigo-600 border-indigo-200 border' : 'bg-transparent text-gray-500 hover:bg-indigo-100'}`}>
                          <Briefcase size={20} /> 上班/開會
                        </button>
                        <button onClick={() => setOccasion('casual')} className={`flex-1 py-2 px-1 rounded-xl flex flex-col items-center justify-center gap-1 text-sm transition-all ${occasion === 'casual' ? 'bg-white shadow-md text-emerald-600 border-emerald-200 border' : 'bg-transparent text-gray-500 hover:bg-indigo-100'}`}>
                          <Coffee size={20} /> 休閒/日常
                        </button>
                        <button onClick={() => setOccasion('date')} className={`flex-1 py-2 px-1 rounded-xl flex flex-col items-center justify-center gap-1 text-sm transition-all ${occasion === 'date' ? 'bg-white shadow-md text-pink-500 border-pink-200 border' : 'bg-transparent text-gray-500 hover:bg-indigo-100'}`}>
                          <Heart size={20} /> 約會/聚餐
                        </button>
                      </div>
                    </div>
                  </div>
                </div>

                <button 
                  onClick={drawOutfit}
                  disabled={isDrawing || wardrobe.length === 0}
                  className="w-full py-4 rounded-2xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold text-lg shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all disabled:opacity-70 disabled:hover:translate-y-0 flex justify-center items-center gap-2"
                >
                  {isDrawing ? <><Dices className="animate-spin" /> AI 翻找衣櫃中...</> : wardrobe.length === 0 ? <>⚠️ 請先至數位衣櫃導入衣服</> : <><Dices /> 幫我配一套！</>}
                </button>

                {outfit && !isDrawing && (
                  <div className="w-full mt-4 space-y-3 animate-in zoom-in-95 duration-500">
                    <h3 className="text-center font-bold text-gray-700 mb-4 flex items-center justify-center gap-2">
                      ✨ 專屬你的今日穿搭 ✨
                    </h3>
                    
                    {['top', 'bottom', 'shoes'].map((type, idx) => {
                      const item = outfit[type];
                      let label = { top: '上衣', bottom: '下著', shoes: '鞋子' }[type];
                      
                      // If the top is a dress, we skip rendering the bottom slot
                      if (type === 'bottom' && outfit.top?.type === 'dress') return null;
                      // And we rename the top label
                      if (type === 'top' && outfit.top?.type === 'dress') label = '連身/洋裝';

                      return (
                        <div key={idx} className="bg-white border-2 border-dashed border-gray-200 rounded-2xl p-4 flex items-center gap-4 shadow-sm relative overflow-hidden group hover:border-indigo-400 transition-colors">
                          <div className="absolute top-2 left-2 text-[10px] font-bold text-gray-400 uppercase tracking-wider">{label}</div>
                          {item ? (
                            <>
                              <div className="w-16 h-16 rounded-xl flex items-center justify-center text-3xl shadow-inner bg-gray-50 overflow-hidden shrink-0">
                                {item.imageUrl ? <img src={item.imageUrl} alt="" className="w-full h-full object-cover" /> : item.icon}
                              </div>
                              <div className="flex-1">
                                <h4 className="font-bold text-gray-800 text-lg">{item.name}</h4>
                                <div className="flex gap-1 mt-1">
                                  {item.weather.map(w => <span key={w} className="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">{w}</span>)}
                                </div>
                              </div>
                            </>
                          ) : (
                            <div className="text-gray-400 text-sm flex items-center gap-2 w-full justify-center py-4">
                              衣櫃裡找不到適合的{label} 😢
                            </div>
                          )}
                        </div>
                      );
                    })}
                    
                    {/* Save to Diary Button */}
                    <button 
                      onClick={saveOutfitToDiary}
                      disabled={saveSuccessMsg || Object.values(outfit).every(item => item === null)}
                      className={`w-full py-3 font-semibold rounded-xl flex items-center justify-center gap-2 transition-all mt-4 ${saveSuccessMsg ? 'bg-emerald-50 text-emerald-600 border border-emerald-200' : 'bg-pink-50 text-pink-600 hover:bg-pink-100 border border-pink-100'}`}
                    >
                      {saveSuccessMsg ? (
                         <>✨ 已儲存到穿搭日記！</>
                      ) : (
                         <><BookHeart size={18} /> 儲存這套穿搭</>
                      )}
                    </button>

                    <button onClick={drawOutfit} className="w-full py-3 text-indigo-600 font-semibold bg-indigo-50 rounded-xl hover:bg-indigo-100 transition-colors mt-2">
                      不滿意？再抽一次
                    </button>
                  </div>
                )}
              </div>
            )}

            {activeTab === 'diary' && (
              <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-xl font-bold text-gray-800">穿搭日記</h2>
                  <p className="text-xs text-gray-400 mt-1">共 {outfitDiary.length} 篇</p>
                </div>

                {outfitDiary.length === 0 ? (
                  <div className="mt-10 flex flex-col items-center justify-center text-center px-4 animate-in fade-in">
                    <div className="w-20 h-20 bg-pink-50 rounded-full flex items-center justify-center text-pink-300 mb-4 shadow-inner">
                      <BookHeart size={40} />
                    </div>
                    <h3 className="font-bold text-gray-800 text-lg mb-2">還沒有任何穿搭紀錄！</h3>
                    <p className="text-sm text-gray-500">快去「抽籤搭配」抽出滿意的組合<br/>並把它儲存下來吧！</p>
                    <button onClick={() => setActiveTab('lottery')} className="mt-6 px-6 py-2 bg-indigo-600 text-white rounded-full text-sm font-bold shadow-md hover:shadow-lg transition-all">
                      去抽籤看看
                    </button>
                  </div>
                ) : (
                  <div className="space-y-4">
                    {outfitDiary.map(entry => (
                      <div key={entry.id} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 relative group overflow-hidden">
                        <div className="flex justify-between items-center mb-3">
                          <span className="text-xs font-bold text-gray-500 flex items-center gap-1">
                            <Bookmark size={14} className="text-pink-400" />
                            {entry.timestamp}
                          </span>
                          <div className="flex gap-2">
                            <span className="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full capitalize">{entry.weather}</span>
                            <span className="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full capitalize">{entry.occasion}</span>
                          </div>
                          <button 
                            onClick={() => deleteDiaryEntry(entry.id)}
                            className="absolute top-3 right-3 p-1.5 bg-red-50 text-red-500 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-10"
                          >
                            <Trash2 size={14} />
                          </button>
                        </div>
                        
                        <div className="grid grid-cols-3 gap-2">
                          {['top', 'bottom', 'shoes'].map(type => (
                            <div key={type} className="aspect-[4/5] bg-gray-50 rounded-xl overflow-hidden flex flex-col items-center justify-center border border-gray-100 relative p-1">
                              {entry.outfit[type] ? (
                                <>
                                  <div className="flex-1 w-full flex items-center justify-center overflow-hidden rounded-lg">
                                     {entry.outfit[type].imageUrl ? <img src={entry.outfit[type].imageUrl} alt="" className="w-full h-full object-cover" /> : <span className="text-2xl">{entry.outfit[type].icon}</span>}
                                  </div>
                                  <div className="w-full text-center truncate text-[10px] text-gray-500 mt-1 font-medium px-1">
                                    {entry.outfit[type].name}
                                  </div>

                              ) : (
                                <span className="text-xs text-gray-300">無</span>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {activeTab === 'wardrobe' && (
              <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-xl font-bold text-gray-800">我的數位衣櫃</h2>

                      <button 
                        onClick={() => { if(window.confirm('確定要清空所有衣物嗎？此動作無法復原！')) setWardrobe([]); }}
                        className="text-xs font-bold text-red-500 hover:text-red-600 bg-red-50 hover:bg-red-100 px-2 py-1 rounded transition-colors"
                      >
                        清空衣櫃

                    )}
                  </div>
                </div>

                <div className="flex flex-col gap-3 mb-6 bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100">
                  <h3 className="text-xs font-bold text-indigo-800 mb-1 flex items-center gap-1">✨ 導入單品</h3>
                  <button onClick={() => fileInputRef.current?.click()} className="w-full bg-gray-900 text-white px-4 py-3 rounded-xl text-sm font-bold shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 active:scale-95">
                    <span className="text-xl leading-none">+</span> <span>一鍵智能導入 (支援批次/全身照)</span>
                    <input ref={fileInputRef} type="file" accept="image/*" multiple className="hidden" onChange={handleBatchUpload} />
                  </button>
                </div>

                {wardrobe.length === 0 ? (
                  <div className="mt-10 flex flex-col items-center justify-center text-center px-4 animate-in fade-in">
                    <div className="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-300 mb-4 shadow-inner">
                      <Shirt size={40} />
                    </div>
                    <h3 className="font-bold text-gray-800 text-lg mb-2">衣櫃目前是空的喔！</h3>
                    <p className="text-sm text-gray-500">點擊上方按鈕導入衣服吧<br/>(可一次框選多張單品或全身照)</p>
                  </div>
                ) : (
                  <>
                      <div 
                        ref={filterContainerRef}
                        {...createDragHandlers(filterContainerRef, dragRef)}
                        className="flex gap-2 mb-5 overflow-x-auto pb-2 hide-scroll -mx-1 px-1 cursor-grab active:cursor-grabbing select-none"
                      >
                        <button onClick={() => setFilterCategory('all')} className={`shrink-0 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm transition-all active:scale-95 ${filterCategory === 'all' ? 'bg-gray-900 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}`}>全部</button>
                        {Object.keys(typeLabels).map(t => (
                          <button key={t} onClick={() => setFilterCategory(t)} className={`shrink-0 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm transition-all active:scale-95 ${filterCategory === t ? 'bg-gray-900 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                            {typeLabels[t]}
                          </button>
                        ))}
                      </div>

                    <div className="grid grid-cols-2 gap-3">
                      {(filterCategory === 'all' ? wardrobe : wardrobe.filter(item => item.type === filterCategory)).map(item => (
                        <div key={item.id} className="bg-white border border-gray-100 rounded-2xl p-3 shadow-sm relative group overflow-hidden">
                          <div className="absolute top-2 right-2 flex gap-1 z-10 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button 
                              onClick={() => setEditingItem({ ...item })}
                              className="p-1.5 bg-blue-50 text-blue-500 rounded-full hover:bg-blue-100 transition-colors"
                              title="編輯此單品"
                            >
                              <Edit2 size={14} />
                            </button>
                            <button 
                              onClick={() => deleteItem(item.id)}
                              className="p-1.5 bg-red-50 text-red-500 rounded-full hover:bg-red-100 transition-colors"
                              title="刪除"
                            >
                              <Trash2 size={14} />
                            </button>
                          </div>
                          {item.isDeepSplit && <div className="absolute top-2 left-2 z-10 bg-gradient-to-r from-gray-700 to-gray-900 text-white text-[9px] px-2 py-0.5 rounded-full font-bold shadow-sm">特寫裁切</div>}
                          
                          <div className={`w-full aspect-[4/5] rounded-xl flex items-center justify-center text-5xl mb-3 shadow-inner bg-gray-50 overflow-hidden`}>
                            {item.imageUrl ? <img src={item.imageUrl} alt="" className="w-full h-full object-cover" /> : item.icon}
                          </div>
                          
                          <h4 className="font-bold text-gray-800 text-sm truncate">{item.name}</h4>
                          <div className="flex flex-wrap gap-1 mt-1">
                            <span className="text-[10px] bg-indigo-50 text-indigo-600 border border-indigo-100 px-1.5 py-0.5 rounded font-medium">{item.colorName}</span>
                            {item.material && <span className="text-[10px] bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded">{item.material}</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </>
                )}
              </div>
            )}

            {editingItem && (
              <div className="absolute inset-0 bg-gray-900/60 backdrop-blur-sm z-[60] flex flex-col items-center justify-center p-4">
                <div className="w-full max-w-sm bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in zoom-in-95 duration-200">
                  <header className="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                    <h3 className="font-bold text-gray-800 text-lg flex items-center gap-2">
                      <Edit2 size={18} className="text-indigo-500" />
                      編輯單品資訊
                    </h3>
                    <button onClick={() => setEditingItem(null)} className="text-gray-400 hover:text-gray-600 transition-colors">
                       <span className="text-2xl leading-none">&times;</span>
                    </button>
                  </header>
                  
                  <div className="overflow-y-auto p-5 hide-scroll">
                    <div className="w-32 h-40 mx-auto rounded-2xl bg-gray-50 flex items-center justify-center shadow-inner overflow-hidden mb-6 border border-gray-100">
                      {editingItem.imageUrl ? <img src={editingItem.imageUrl} alt="" className="w-full h-full object-cover" /> : editingItem.icon}
                    </div>

                    <form id="editForm" onSubmit={saveEditedItem} className="space-y-4">
                      <div>
                        <label className="block text-xs font-bold text-gray-600 mb-1.5">服裝種類</label>
                        <select 
                          value={editingItem.type} 
                          onChange={(e) => handleEditChange('type', e.target.value)}
                          className="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3 outline-none transition-colors"
                        >
                          {Object.entries(typeLabels).map(([val, label]) => (
                            <option key={val} value={val}>{label}</option>
                          ))}
                        </select>
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-gray-600 mb-1.5">主要顏色</label>
                        <div className="relative">
                          <select 
                            value={editingItem.colorName} 
                            onChange={(e) => handleEditChange('colorName', e.target.value)}
                            className="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3 pl-10 outline-none transition-colors appearance-none"
                          >
                            {colorPalette.map(c => (
                              <option key={c.name} value={c.name}>{c.name}</option>
                            ))}
                          </select>
                          <div 
                            className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 rounded-full border border-gray-300 shadow-sm pointer-events-none"
                            style={{ backgroundColor: editingItem.colorHex }}
                          ></div>
                        </div>
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-gray-600 mb-1.5">材質/印花備註</label>
                        <input 
                          type="text" 
                          value={editingItem.material || ''} 
                          onChange={(e) => handleEditChange('material', e.target.value)}
                          placeholder="例如: 棉質、雪紡、條紋..."
                          className="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3 outline-none transition-colors"
                        />
                      </div>

                      {/* Split Dress to Top+Bottom */}
                      {editingItem.type === 'dress' && (
                        <div className="mt-2 p-3 bg-amber-50 border border-amber-200 rounded-2xl">
                          <p className="text-xs text-amber-700 mb-2 font-medium">⚠️ 如果這件被誤判為洋裝，其實是上衣+下身：</p>
                          <button
                            type="button"
                            disabled={isSplitting}
                            onClick={() => splitDressToTopBottom(editingItem)}
                            className="w-full py-2.5 rounded-xl font-bold text-sm bg-gradient-to-r from-amber-500 to-orange-500 text-white shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all disabled:opacity-60 flex items-center justify-center gap-2"
                          >
                            {isSplitting ? (
                              <><div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> 拆分處理中...</>
                            ) : (
                              <>✂️ 拆分為上衣 + 下身</>
                            )}
                          </button>
                        </div>
                      )}
                    </form>
                  </div>

                  <footer className="p-4 border-t border-gray-100 bg-white grid grid-cols-2 gap-3 shrink-0">
                    <button 
                      type="button" 
                      onClick={() => setEditingItem(null)} 
                      className="py-3 rounded-xl font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-colors"
                    >
                      取消
                    </button>
                    <button 
                      type="submit" 
                      form="editForm"
                      className="py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-md hover:shadow-lg transition-all"
                    >
                      儲存變更
                    </button>
                  </footer>
                </div>
              </div>
            )}

            {isProcessingModalOpen && (
              <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-6">
                <div className="w-full max-w-sm bg-white border border-gray-100 rounded-[2rem] p-6 shadow-2xl text-gray-800">
                  <div className="text-center mb-6">
                    <div className="inline-block p-4 bg-gray-900 rounded-full text-white mb-4 animate-bounce shadow-lg">✨</div>
                    <h3 className="font-black text-xl text-gray-900">AI 智能分析中</h3>
                    <p className="text-xs text-gray-500 mt-2">
                      {processQueue.length > 1 ? `批次處理中 (${processQueue.filter(i => i.status.includes('done')).length}/${processQueue.length})...` : '自動偵測與單品去背...'}
                    </p>
                  </div>
                  
                  <div className="space-y-3 max-h-60 overflow-y-auto pr-2 hide-scroll">
                    {processQueue.map((item) => (
                      <div key={item.id} className="flex items-center gap-4 p-3 bg-gray-50 rounded-2xl border border-gray-100">
                        <img src={item.url} alt="" className="w-12 h-12 rounded-xl object-cover bg-white shadow-sm" />
                        <div className="flex-1 min-w-0">
                          <div className="text-xs font-bold text-gray-800 truncate">{item.name}</div>
                          <div className="text-[10px] text-gray-500 mt-1">
                            {renderProcessStatus(item)}
                          </div>
                        </div>
                        <div>
                          {item.status.includes('done') ? (
                            <div className="w-6 h-6 bg-gray-900 text-white rounded-full flex items-center justify-center text-xs shadow-sm">✓</div>
                          ) : (
                            <div className="w-5 h-5 border-[3px] border-gray-200 border-t-gray-900 rounded-full animate-spin"></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </main>

          <nav className="absolute bottom-0 w-full bg-white border-t border-gray-200 flex shadow-[0_-4px_20px_rgba(0,0,0,0.05)] pb-[env(safe-area-inset-bottom)] shrink-0 z-10">
            <button onClick={() => setActiveTab('lottery')} className={`flex-1 py-3 flex flex-col items-center justify-center gap-1 transition-colors ${activeTab === 'lottery' ? 'text-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>
              <Dices size={24} className={activeTab === 'lottery' ? 'animate-bounce' : ''} />
              <span className="text-[10px] font-bold">抽籤搭配</span>
            </button>
            <button onClick={() => setActiveTab('wardrobe')} className={`flex-1 py-3 flex flex-col items-center justify-center gap-1 transition-colors ${activeTab === 'wardrobe' ? 'text-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>
              <Shirt size={24} />
              <span className="text-[10px] font-bold">數位衣櫃</span>
            </button>
            <button onClick={() => setActiveTab('diary')} className={`flex-1 py-3 flex flex-col items-center justify-center gap-1 transition-colors ${activeTab === 'diary' ? 'text-pink-500' : 'text-gray-400 hover:text-gray-600'}`}>
              <BookHeart size={24} />
              <span className="text-[10px] font-bold">穿搭日記</span>
            </button>
          </nav>

        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
